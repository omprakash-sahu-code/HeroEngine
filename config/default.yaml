# HeroEngine Global Configuration File

# Camera input settings
camera:
  device_id: 0
  width: 1280
  height: 720
  fps: 30

# Window / Display settings
display:
  title: "HeroEngine - Creative Tech Showcase"
  width: 1280
  height: 720
  fullscreen: false
  vsync: true

# Rendering quality
rendering:
  particle_limit: 10000

# Post-processing quality and bloom controls
post_processing:
  enabled: true
  threshold: 0.6          # Brightness threshold to start blooming
  bloom_intensity: 1.2    # Intensity scale of the blur overlay
  exposure: 1.0           # Exposure factor for HDR mapping
  gamma: 2.2              # Display gamma correction
  downsample_factor: 2    # Speed up blurring by downsampling buffer size

# Core tracking options
tracking:
  hands:
    enabled: true
    max_num_hands: 2
    min_detection_confidence: 0.7
    min_tracking_confidence: 0.7
  pose:
    enabled: false
    min_detection_confidence: 0.5
  face:
    enabled: false
    min_detection_confidence: 0.5

# Active module options
module:
  active: "sorcerer"  # Name of module folder in src/modules/

# Network Telemetry & External Integration Layer
network:
  enabled: true
  channels: ["hands", "gestures", "module", "camera", "effects", "fps"]
  osc:
    enabled: true
    host: "127.0.0.1"
    port: 9000
    rate: 60
  websocket:
    enabled: true
    host: "127.0.0.1"
    port: 8765
    rate: 30

# Preset specifications for GPU instanced particle systems
particle_presets:
  whip_trail:
    color: [1.0, 0.42, 0.05]
    speed: 0.22
    mode: "ballistic"
    lifetime_min: 0.4
    lifetime_max: 0.9
  spell_charge:
    color: [1.0, 0.65, 0.08]
    speed: 0.0
    mode: "spiral"
    lifetime_min: 0.7
    lifetime_max: 1.1
  shield_ambient:
    color: [1.0, 0.6, 0.1]
    speed: 0.25
    mode: "ballistic"
    lifetime_min: 0.4
    lifetime_max: 0.9
